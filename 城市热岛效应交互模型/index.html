<!doctype html>
<html lang="zh-CN">

  <main class="app-shell">
    <section class="model-layout" aria-label="城市热岛效应交互模型">
      <div class="model-area">
        <header class="control-strip">
          <div class="title-block">
            <h1>城市热岛效应模型</h1>
            <p id="stepKicker">步骤 1 / 7 · 下垫面</p>
          </div>

          <div class="control-actions" aria-label="模型控制">
            <button class="icon-button primary" id="playPause" type="button" aria-label="播放" title="播放">
              <span id="playIcon" aria-hidden="true">▶</span>
            </button>
            <button class="icon-button" id="resetBtn" type="button" aria-label="重置" title="重置">
              <span aria-hidden="true">↺</span>
            </button>
            <label class="progress-control" for="progressRange">
              <span id="progressText">1/7</span>
              <input id="progressRange" type="range" min="0" max="6" step="1" value="0" aria-label="进度条">
            </label>
            <button class="export-button" id="exportSvg" type="button">
              <span aria-hidden="true">⇩</span>
              导出矢量图
            </button>
          </div>
        </header>

        <div class="svg-wrap">
          <svg id="heatIslandSvg" class="model-svg step-0" viewBox="0 0 1280 820" role="img" aria-labelledby="svgTitle svgDesc" xmlns="http://www.w3.org/2000/svg">
            <title id="svgTitle">城市热岛效应模型</title>
            <desc id="svgDesc">高中地理课堂用交互 SVG，展示城市下垫面、热岛环流、污染物抬升、绿地水体降温、夜间热岛和治理措施。</desc>
            <defs>
              <linearGradient id="skyDay" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#bfe7ff"/>
                <stop offset="0.55" stop-color="#eaf7ff"/>
                <stop offset="1" stop-color="#fff4d8"/>
              </linearGradient>
              <linearGradient id="skyNight" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#17203a"/>
                <stop offset="0.6" stop-color="#28385a"/>
                <stop offset="1" stop-color="#556072"/>
              </linearGradient>
              <linearGradient id="cityWarm" x1="0" x2="0" y1="1" y2="0">
                <stop offset="0" stop-color="#e94b35" stop-opacity="0.72"/>
                <stop offset="0.62" stop-color="#ff9f43" stop-opacity="0.35"/>
                <stop offset="1" stop-color="#ffe8a6" stop-opacity="0"/>
              </linearGradient>
              <radialGradient id="heatDomeGradient" cx="50%" cy="55%" r="58%">
                <stop offset="0" stop-color="#ff6b35" stop-opacity="0.45"/>
                <stop offset="0.58" stop-color="#ffb84d" stop-opacity="0.20"/>
                <stop offset="1" stop-color="#ffe9b8" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="coolGradient" cx="50%" cy="50%" r="55%">
                <stop offset="0" stop-color="#34c6e8" stop-opacity="0.45"/>
                <stop offset="1" stop-color="#34c6e8" stop-opacity="0"/>
              </radialGradient>
              <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="8"/>
              </filter>
              <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
                <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#263238" flood-opacity="0.22"/>
              </filter>
              <marker id="arrowHot" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#e5482f"/>
              </marker>
              <marker id="arrowCool" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#168aad"/>
              </marker>
              <marker id="arrowAir" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#56616f"/>
              </marker>
            </defs>

            <style><![CDATA[
              .model-svg * { vector-effect: non-scaling-stroke; }
              .sky-night, .moon, .stars, .night-phase { opacity: 0; transition: opacity .45s ease; }
              .day-star { opacity: 1; transition: opacity .45s ease; }
              .phase { opacity: 0; transition: opacity .45s ease, transform .45s ease; }
              .label-text { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3a; paint-order: stroke; stroke: rgba(255,255,255,.9); stroke-width: 7px; stroke-linejoin: round; }
              .small-label { font-size: 19px; font-weight: 650; }
              .tiny-label { font-size: 16px; font-weight: 650; }
              .metric-label { font: 800 22px "Microsoft YaHei", Arial, sans-serif; fill: #8f2f20; paint-order: stroke; stroke: #fff; stroke-width: 7px; stroke-linejoin: round; }
              .caption-box { fill: rgba(255,255,255,.9); stroke: rgba(53,70,86,.22); stroke-width: 1.4; rx: 10; }
              .surface-line { stroke: #2f4858; stroke-width: 2.2; stroke-dasharray: 5 8; fill: none; }
              .heat-line { stroke: #e5482f; stroke-width: 7; stroke-linecap: round; fill: none; marker-end: url(#arrowHot); opacity: .82; }
              .cool-line { stroke: #168aad; stroke-width: 6; stroke-linecap: round; fill: none; marker-end: url(#arrowCool); opacity: .86; }
              .air-line { stroke: #56616f; stroke-width: 5.6; stroke-linecap: round; fill: none; marker-end: url(#arrowAir); opacity: .78; }
              .thin-air { stroke-width: 3.8; stroke-dasharray: 9 9; }
              .heat-glow { fill: url(#cityWarm); filter: url(#softBlur); }
              .dome { fill: url(#heatDomeGradient); stroke: #ff7b3d; stroke-width: 3; stroke-dasharray: 10 10; opacity: .76; }
              .cool-spot { fill: url(#coolGradient); }
              .building { fill: #7b8794; stroke: #46515c; stroke-width: 2; }
              .building-dark { fill: #65717e; }
              .window { fill: #ffe08a; opacity: .86; }
              .roof-hot { fill: #d64b3b; opacity: .62; }
              .road { fill: #303841; }
              .lane { stroke: #f7d77a; stroke-width: 5; stroke-dasharray: 28 26; }
              .park { fill: #54b96f; stroke: #2f8249; stroke-width: 2; }
              .water { fill: #3aaed8; stroke: #1976a2; stroke-width: 2; }
              .farm { fill: #c8d66b; stroke: #91a540; stroke-width: 2; }
              .soil { fill: #d9b36a; }
              .smoke { fill: #5f6672; opacity: .72; }
              .particle { fill: #3f4651; opacity: .76; }
              .mitigation-tag { fill: #f9fbff; stroke: #4d7c59; stroke-width: 2; rx: 10; }
              .green-roof { fill: #3fa45b; stroke: #1f6c38; stroke-width: 2; }
              .cool-roof { fill: #f6fbff; stroke: #83b9d6; stroke-width: 2; }
              .permeable { fill: #b7a27e; stroke: #79684e; stroke-width: 2; stroke-dasharray: 4 5; }
              .step-0 .surface-phase,
              .step-1 .surface-phase,
              .step-2 .surface-phase,
              .step-3 .surface-phase,
              .step-4 .surface-phase,
              .step-5 .surface-phase,
              .step-6 .surface-phase { opacity: 1; }
              .step-1 .warming-phase,
              .step-2 .warming-phase,
              .step-3 .warming-phase,
              .step-4 .warming-phase,
              .step-5 .warming-phase,
              .step-6 .warming-phase { opacity: 1; }
              .step-2 .circulation-phase,
              .step-3 .circulation-phase,
              .step-4 .circulation-phase,
              .step-5 .circulation-phase,
              .step-6 .circulation-phase { opacity: 1; }
              .step-3 .pollution-phase,
              .step-4 .pollution-phase,
              .step-5 .pollution-phase,
              .step-6 .pollution-phase { opacity: 1; }
              .step-4 .cooling-phase,
              .step-5 .cooling-phase,
              .step-6 .cooling-phase { opacity: 1; }
              .step-5 .sky-night,
              .step-5 .moon,
              .step-5 .stars,
              .step-5 .night-phase { opacity: 1; }
              .step-5 .day-star { opacity: 0; }
              .step-5 .dome { opacity: .92; }
              .step-5 .heat-glow { opacity: .92; }
              .step-6 .mitigation-phase { opacity: 1; }
              .step-6 .dome { opacity: .32; }
              .step-6 .heat-glow { opacity: .45; }
              .is-playing .heat-wave { animation: heatRise 2.4s ease-in-out infinite; }
              .is-playing .cool-wave { animation: coolPulse 2.2s ease-in-out infinite; }
              .is-playing .particle { animation: driftUp 3s ease-in-out infinite; }
              .is-playing .air-line { animation: dashMove 2.2s linear infinite; }
              @keyframes heatRise {
                0%, 100% { transform: translateY(0); opacity: .64; }
                50% { transform: translateY(-14px); opacity: 1; }
              }
              @keyframes coolPulse {
                0%, 100% { transform: translateY(0); opacity: .58; }
                50% { transform: translateY(-8px); opacity: 1; }
              }
              @keyframes driftUp {
                0% { transform: translateY(12px); opacity: .2; }
                55% { opacity: .88; }
                100% { transform: translateY(-22px); opacity: .18; }
              }
              @keyframes dashMove {
                to { stroke-dashoffset: -48; }
              }
            ]]></style>
